name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# don't cancel in-flight deploys: a canceled Pages deployment permanently
# poisons that commit SHA's deployment ID
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # NOTE: do not add retry steps here — the deployment ID is the commit
      # SHA, so a timed-out (canceled) first attempt makes same-run retries
      # fail instantly with "Deployment cancelled". Retry = push a new commit.
      - id: deployment
        uses: actions/deploy-pages@v4
